name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # IN CI, A SKIPPED TEST IS A FAILED TEST.
      #
      # CI is the one place where every dependency is supposed to be present — Docker,
      # Chrome, a network. So a skip here does not mean "not applicable", it means a
      # guard fired that should not have, and a guard that fires wrongly is invisible:
      # nobody reads "skipped".
      #
      # anvil's sandbox tests skipped on EVERY Linux CI run for the life of the project
      # — `pass 11 · fail 0 · skipped 9`, green — because the skip guard probed by
      # running anvil, and anvil was broken. The breakage switched off the tests that
      # would have caught it. This is the net under that.
      - name: run the tests — and none of them may be skipped
        run: |
          node --test 2>&1 | tee "$RUNNER_TEMP/test.txt"
          code=${PIPESTATUS[0]}
          test "$code" -eq 0 || exit $code
          n=$(grep -oE '^# skipped [0-9]+|^. skipped [0-9]+' "$RUNNER_TEMP/test.txt" | grep -oE '[0-9]+$' | head -1)
          echo "skipped: ${n:-0}"
          if [ "${n:-0}" -ne 0 ]; then
            echo "::error::${n} test(s) skipped in CI. Everything they need is installed here — a skip means a guard misfired, and a green build is hiding it."
            exit 1
          fi

  # Looking is part of the build now. This tool shipped a phone layout that dragged
  # the page 250px sideways, and controls at 2.4:1, past a green `node --test` — a
  # test suite does not look at the page. iris does: phone, tablet and desktop, in
  # both themes, and it fails here rather than in front of someone.
  # CAN THE TEST SUITE STILL FAIL? Break the code on purpose in the places whose breakage
  # costs the most, and demand the suite goes RED. A surviving canary means the test guarding
  # that line has stopped guarding it.
  #
  # It found one here immediately: reapStale's cutoff — WHO IS ALIVE, the question this board
  # exists to answer — could have its minus flipped to a plus with the whole suite green.
  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: break it on purpose — every canary must die
        run: node scripts/mutants.mjs

  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # THE GATE WAS LOOKING AT AN EMPTY DASHBOARD.
      #
      # `npm run seed` POSTs to the HTTP API — and it was being run BEFORE the server
      # started, so every call was refused, and `|| true` swallowed the whole thing. So
      # iris rendered a board with no tasks on it, for months, and pronounced it clean.
      #
      # An empty dashboard cannot overflow, cannot collide, and cannot clip. There was
      # nothing on it. A UI gate that never sees a row of data is not a gate.
      #
      # (This is the same shape as iris's own `stdio:'ignore'` bug: a tool built to make
      # failures visible, with a blindfold on in its own launcher.)
      - name: Serve it, THEN put something on it
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
          # And prove there is something to look at. If the seed silently does nothing,
          # the gate goes green on a blank page — which is exactly how we got here.
          tasks=$(curl -sf http://localhost:7700/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).tasks")
          echo "seeded tasks: $tasks"
          test "$tasks" -gt 0 || { echo "::error::the board is empty — iris would be auditing a blank page"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: phone,tablet,desktop
          name: agent-hq
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back

  # THE EMPTY STATE IS THE ONE STATE EVERY USER SEES FIRST.
  #
  # The `look` job seeds data on purpose — a UI gate that has never seen a row of data is a
  # screenshot of an empty room. But that means the EMPTY page stopped being rendered by
  # anything at all, and real bugs were living in it: `scout serve` crashed at startup on a
  # machine with no cache, and lens told a brand-new user their index was "stale" when they
  # had never made one. Both states are audited now, because they are different states.
  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: serve it with NOTHING in it, exactly as a new user would
        run: |
          PORT=7700 HQ_DB_PATH=/tmp/empty/hq.db node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7700/api/health >/dev/null || { echo "::error::the server did not start on an empty store — that is what a new user gets"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: phone,tablet,desktop
          name: agent-hq-first-run
          pre: >-
            const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(!vis.length) throw new Error('THE SERVER SAID EMPTY AND THE PAGE SAID NOTHING — a fresh install shows the user a blank room');
          tokens: kit

  # ── SEVEN OF THE EIGHT VIEWS HAD NEVER BEEN RENDERED BY ANYTHING ──────────────
  #
  # This app is TABS: Kanban, Flow, Agents, Memory, Graph, Messages, Ledger, Activity. Every gate
  # here — look, states, first-run, dead-api, slow-api, refused-write — loads the page and audits
  # whichever one it boots into. That is one view out of eight. The other seven are shipped, and
  # nothing has ever looked at them.
  #
  # It is the same shape this repo keeps paying for ("a screenshot of an empty room", "the gate was
  # standing in the doorway"), and the same argument as the note in `look`: a state that is never
  # rendered is a state that is never checked, and it will rot, quietly, forever. They are all clean
  # today — that is exactly the moment to put a gate on them, while it costs nothing.
  #
  # One job per view, so a failure names the view.
  # 🔑 THE HOVER LISTS ARE PER-VIEW BECAUSE THE TRUTH IS PER-VIEW.
  #
  # This was one union list of 16 for all eight views, and iris said 15 of them "landed" on every
  # single one — .card on the ledger, .agent on the board. They cannot all be there. It counted a
  # selector as landed when it MATCHED THE DOM, and this is an SPA that mounts every view and hides
  # the inactive ones, so every selector matched everywhere and nothing was ever reported as unseen.
  #
  # iris counts what RENDERS now (iris ad44ffe), and the real answer is 2–5 per view. Each view
  # names what that view actually puts on the screen; a list that names more is a list that lies.
  look-views:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { view: board,    hover: '.bf, .card, .new-task, .tab, .xtk a' }
          - { view: flow,     hover: '.tab, .xtk a' }
          - { view: agents,   hover: '.agent, .tab, .xtk a' }
          - { view: memory,   hover: '.nsf, .tab, .xtk a' }
          - { view: graph,    hover: '.gl-item, .graph-controls button, .tab, .xtk a' }
          - { view: messages, hover: '.compose-send, .tab, .xtk a' }
          - { view: ledger,   hover: '.tab, .xtk a' }
          - { view: activity, hover: '.actf, .tab, .xtk a' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN seed it — and prove the board is not empty
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
          n=$(curl -sf "http://localhost:7700/api/tasks?limit=200" | node -pe "JSON.parse(require('fs').readFileSync(0)).length ?? 0")
          echo "seeded tasks: $n"
          test "$n" -gt 0 || { echo "::error::the board is empty — every view would be an empty room"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          # 🔑 WAS `desktop`. Eight views, every one of them rendered at one width, for months.
          # cortex's panels were clean on desktop and broke on a phone in four separate ways —
          # a panel 17px off the screen, a close button you could not reach, the brand 86%
          # buried. Auditing one viewport is auditing one third of the product.
          viewports: phone,tablet,desktop
          name: hq-${{ matrix.view }}
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
          # A HOVER STATE IS CSS NOBODY HAS EVER LOOKED AT — JS cannot pose :hover, it is the
          # browser's own. cortex, anvil and recall each shipped a real bug behind one. This board
          # is the last surface in the kit that had never been swept; it comes back clean, and the
          # gate is here so it stays that way. What each view really renders — see the note above.
          hover: ${{ matrix.hover }}
          # Click the tab, then PROVE we arrived and that something rendered. A --pre that throws makes
          # iris report "the state was never reached and NOTHING was audited" instead of quietly
          # grading the Kanban board again and calling it Ledger.
          #
          # The two sleeps that used to do this (1500/1800) were bets: they pass on a laptop and fail
          # on a loaded runner. cortex's newest gate caught its own panel mid-slide on the first CI
          # run that ever opened it. A poll waits for the tab to ARRIVE.
          pre: >-
            const until=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the ${{ matrix.view }} view to arrive');};await until(()=>document.querySelectorAll('.tab').length>0);const t=document.querySelector('.tab[data-view="${{ matrix.view }}"]');if(!t) throw new Error('no such tab: ${{ matrix.view }}');t.click();await until(()=>document.querySelector('.tab.active')?.dataset.view==='${{ matrix.view }}');await until(()=>{const m=document.querySelector('main,.view,#view');return m&&m.textContent.trim();});

  # ── THE MODAL NOTHING EVER OPENED ─────────────────────────────────────────────
  #
  # Eleven of this stylesheet's twenty-two hover selectors render in NO view: the new-task modal
  # (.nt-*), the task modal's close (.modal-x), the graph's detail panel (.gp-*, .gsd-item,
  # .graph-filterpill), .ag-row, .tm-dep. Half the hover surface of this app is behind a button,
  # and look-views cannot press it — every one of those is a door, not a defect in a view.
  #
  # I only learned the number was ELEVEN once iris started counting what renders instead of what
  # matches (ad44ffe). Before that the report said 15 of 22 landed on every view and I believed it
  # in a commit message, which is the whole reason that fix matters.
  #
  # And a bug was living in here: button#nt-x is 6px off the 4px grid this kit declares, because a
  # <button> with a width and no padding gets Chrome's UA 1px 6px. All three close buttons in this
  # file were written that way. `strict: true` fails on it — the first gate to open the door found
  # it immediately, which is the only reason it is fixed.
  look-modal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN seed it — a modal over an empty board is still an empty room
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
          n=$(curl -sf "http://localhost:7700/api/tasks?limit=200" | node -pe "JSON.parse(require('fs').readFileSync(0)).length ?? 0")
          echo "seeded tasks: $n"
          test "$n" -gt 0 || { echo "::error::the board is empty — the modal would open over nothing"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: phone,tablet,desktop
          name: hq-new-task
          tokens: kit
          strict: true
          hover: '.nt-go, .nt-x, .new-task'
          pre: >-
            const until=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the new-task modal to arrive');};await until(()=>document.querySelectorAll('.tab').length>0);document.getElementById('newTaskBtn').click();await until(()=>document.getElementById('nt-title'));

  # ── THE GRAPH'S THREE SHUT DOORS ──────────────────────────────────────────────
  #
  # Half this app's hover surface lives behind buttons no gate presses (C171). The graph held
  # three of those doors, and they stayed shut because the panel opens by CLICKING A NODE ON A
  # CANVAS — there is no selector to press. `window.HQGraph.debug()` hands back page-space node
  # centres ("used by tests/automation" — it was built for exactly this and nothing used it), so
  # a real PointerEvent at a real node opens the real panel. From there: a tag node's [data-filter]
  # raises the filter pill, and typing in #graph-search opens the search dropdown.
  #
  # Behind them: the pill was a mouse-only div (you could see the graph was filtered and had no
  # way to unfilter it from a keyboard), and the search dropdown's 8 rows were unannounced —
  # ↑/↓/Enter drove a selection no screen reader was told about. Both fixed.
  #
  # 🔑 THIS GATE ONCE REPORTED FICTION, AND THE FIX WAS NOT IN THE GATE. The panel fades in over
  # 180ms (gp-in), and auditing mid-fade measured the text at ~77% opacity: iris reported
  # `contrast 4.49:1`, then `4.09`, then `4.17` for the SAME element on identical runs, because
  # it read a different frame each time. Not one of those colours exists on screen for longer
  # than a fifth of a second. The `pre` grew an `await getAnimations()` to hold the page still
  # for the camera. It worked, and it was the wrong place: iris ALREADY emulates
  # prefers-reduced-motion so that the picture is the same picture twice, and this was the one
  # page in the kit that never answered — five animations, not one rule. It answers now
  # (styles.css), so the wait is gone: the gate is deterministic because the PRODUCT is.
  look-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN seed it — an empty graph has no node to click
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
          n=$(curl -sf "http://localhost:7700/api/graph" | node -pe "JSON.parse(require('fs').readFileSync(0)).nodes.length ?? 0")
          echo "graph nodes: $n"
          test "$n" -gt 0 || { echo "::error::the graph is empty — there would be no node to open"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: phone,tablet,desktop
          name: hq-graph
          tokens: kit
          strict: true
          hover: '.gp-chip, .gp-close, .gsd-item, .graph-filterpill, .gp-filterbtn'
          pre: |
            const until = async (f, ms = 9000, what = '') => { const t = Date.now() + ms; while (Date.now() < t) { const v = f(); if (v) return v; await new Promise((r) => setTimeout(r, 50)); } throw new Error('timed out waiting for ' + what); };
            await until(() => document.querySelectorAll('.tab').length > 0, 9000, 'the tabs');
            [...document.querySelectorAll('.tab')].find((t) => /graph/i.test(t.textContent)).click();
            await until(() => window.HQGraph, 9000, 'HQGraph');
            const nodes = await until(() => { const n = window.HQGraph.debug(); return n.length ? n : null; }, 9000, 'graph nodes');
            const cvs = document.querySelector('.graph-wrap canvas');
            const tag = nodes.find((x) => x.type === 'tag');
            if (!tag) throw new Error('no tag node — the filter pill is only reachable from one');
            const o = { bubbles: true, clientX: tag.px, clientY: tag.py, pointerId: 1, isPrimary: true, button: 0 };
            cvs.dispatchEvent(new PointerEvent('pointerdown', o)); cvs.dispatchEvent(new PointerEvent('pointerup', o));
            await until(() => !document.getElementById('graph-panel').hidden, 9000, 'the detail panel');
            const fb = document.querySelector('#gp-body [data-filter]');
            if (!fb) throw new Error('a tag panel with no filter button');
            fb.click();
            await until(() => !document.getElementById('graph-filterpill').hidden, 9000, 'the filter pill');
            const s = document.getElementById('graph-search');
            s.focus(); s.value = 'a'; s.dispatchEvent(new Event('input', { bubbles: true }));
            const rows = await until(() => { const r = [...document.querySelectorAll('.gsd-item')]; return r.length > 1 ? r : null; }, 9000, 'the graph search dropdown');
            if (s.getAttribute('aria-expanded') !== 'true') throw new Error('the open dropdown does not announce aria-expanded');
            s.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowDown', bubbles: true, cancelable: true }));
            if (!rows[0].classList.contains('sel')) throw new Error('ArrowDown did not move the highlight');
            if (s.getAttribute('aria-activedescendant') !== rows[0].id) throw new Error('ArrowDown moved the highlight but not the announcement — they are the same fact');
            if (rows[0].getAttribute('aria-selected') !== 'true') throw new Error('aria-selected did not follow the selection');

  # ── THE STATES NOTHING EVER RENDERED ──────────────────────────────────────────
  # `test` proves the logic. `look` renders the page WORKING. `first-run` renders it
  # EMPTY. Not one of them has ever rendered a control that cannot be pressed, or a row
  # switched off, or a card blocked — the states you have to DO something to reach.
  #
  # So nobody had ever looked at them, and every single one of them was broken: every
  # disabled control in this kit was unreadable, two of them at 1:1 — the exact colour of
  # their own background — under three green gates. A state that is never rendered is a
  # state that is never checked, and it will rot, quietly, forever.
  #
  # This gate poses the page in those states and audits it there.
  states:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # 🔑 THE SEED RAN BEFORE THE SERVER, AND `|| true` ATE THE PROOF.
      #
      # `npm run seed` posts over HTTP. With nothing listening it died with ECONNREFUSED, `|| true`
      # swallowed it, and this gate posed `.blocked` on a board with NO CARDS ON IT — then reported
      # "✓ nothing broken" about an empty room, every run, for the life of the job.
      #
      # Which is the bug the `look` job above already carries a comment about: "agent-hq's gate had
      # been auditing a blank board for months. It went green every time. The seed script existed;
      # nobody ran it." That job was fixed. This one, next door, was not — and the same `|| true`
      # that hid it in the first place hid it again.
      #
      # So: server FIRST, then seed, then PROVE there is something to pose on. A gate that cannot
      # tell an empty board from a healthy one is not a gate.
      - name: Serve it, THEN seed it — and prove the board is not empty
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
          n=$(curl -sf "http://localhost:7700/api/tasks?limit=200" | node -pe "JSON.parse(require('fs').readFileSync(0)).length ?? 0")
          echo "cards the gate will pose: $n"
          test "$n" -gt 0 || { echo "::error::the board is empty — iris would pose .blocked on nothing and call it a state"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: desktop
          tokens: kit
          name: states
          pre: >-
            document.querySelectorAll('button,input,select,textarea').forEach(e=>e.disabled=true);document.querySelectorAll('.card').forEach(e=>e.classList.add('blocked'));document.querySelectorAll('#legend .row,.gl-item').forEach(e=>e.classList.add('off'))

  # ── WHAT DOES IT DRAW WHEN THE SERVER SAYS NO? ────────────────────────────────
  # This UI is a shell that asks a server what to render, and it had never once
  # rendered the answer "no". The helper was `fetch(p).then(r => r.json())` — it never
  # looked at `r.ok`, so a 500 with a JSON body came back looking exactly like DATA,
  # `.map` threw halfway through the render, and the page was left a blank shell.
  #
  # The result: when the backend died you were shown AN EMPTY ROOM. Nothing on screen
  # told "the server is down" apart from "you have no data" — and the `first-run` gate
  # PROVES the empty page looks fine, so it went green over it every time.
  #
  # An error state that renders as an empty state is worse than a crash. A crash at
  # least tells you something happened.
  #
  # --boot breaks the API before the app's first line runs; --pre then asserts the app
  # ADMITTED it. A page that quietly renders nothing fails this job.
  dead-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # No seed, and none is possible: this gate stubs every /api/ call, so nothing a seed wrote could
      # reach the page. It ran `npm run seed || true` anyway — BEFORE the server existed, so it died
      # with ECONNREFUSED every run and `|| true` ate the evidence. Dead code that always fails
      # silently is the camouflage that let the same line hide a REAL empty-board bug in `states`.
      - name: Serve it
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: desktop
          tokens: kit
          name: dead-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?Promise.resolve(new Response('{"error":"ci"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const b=document.getElementById('apidown');if(!b||b.hidden||!b.textContent.trim()) throw new Error('the server said no and the page said NOTHING');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('THE SERVER SAID NO, AND THE PAGE STILL CLAIMS YOU HAVE NOTHING: '+vis.map(e=>e.id||e.className).join(', '));

  # ── AND WHAT DOES IT DRAW WHILE THE SERVER IS STILL THINKING? ─────────────────
  # This app had exactly ONE way of showing "nothing": nothing. So three completely
  # different truths rendered as the same picture — you have no data, the server is
  # broken, and the server has not answered yet.
  #
  # On a slow backend, lens put its welcome screen up — "Pick a file from the tree" —
  # over a tree that had not loaded. The empty state is a CLAIM ("you have nothing"),
  # and the app was making it before it had any evidence. It had not been told
  # "nothing". It had not been told ANYTHING.
  #
  # --boot makes every API call take 20s. The page must say it is still asking.
  slow-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # No seed, and none is possible: this gate stubs every /api/ call, so nothing a seed wrote could
      # reach the page. It ran `npm run seed || true` anyway — BEFORE the server existed, so it died
      # with ECONNREFUSED every run and `|| true` ate the evidence. Dead code that always fails
      # silently is the camouflage that let the same line hide a REAL empty-board bug in `states`.
      - name: Serve it
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: desktop
          tokens: kit
          name: slow-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?new Promise(r=>setTimeout(()=>r(f(u,o)),20000)):f(u,o);
          pre: >-
            const p=document.getElementById('busypill');if(!p||p.hidden) throw new Error('SILENT WAIT: the server is thinking and the page says nothing');if(document.body.getAttribute('aria-busy')!=='true') throw new Error('and nothing announced it to a screen reader either');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('STILL ASKING, YET CLAIMING EMPTY: '+vis.map(e=>e.className).join(', '));

  # ── AND WHAT HAPPENS AFTER YOU ACT? ───────────────────────────────────────────
  # Every state so far has been one the app FOUND itself in. This is the one it is put
  # into: you press the button, the server refuses the write, and… what?
  #
  # The failure mode here is not an error, it is SILENCE. A write that fails quietly is
  # the worst bug a tool like this can have, because the user walks away believing their
  # work was saved. And its twin: the write fails, and the button that would let you try
  # again is still greyed out saying "creating…" — so the app is both wrong and stuck.
  #
  # --boot refuses every non-GET (reads stay healthy). --pre then DRIVES THE REAL WRITE
  # — opens the form, types, presses the button — and demands the page admit it failed
  # and give the control back.
  refused-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # This gate stubs only NON-GET, so its reads pass through and the board behind the refusal is
      # real — which means the seed matters, and it was running BEFORE the server (ECONNREFUSED,
      # swallowed by `|| true`). The banner was being judged against an empty room.
      - name: Serve it, THEN seed it
        run: |
          PORT=7700 node src/server.js &
          for i in $(seq 30); do curl -sf http://localhost:7700/api/health >/dev/null && break; sleep 1; done
          HQ_URL=http://localhost:7700 npm run seed
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7700/
          viewports: desktop
          tokens: kit
          name: refused-write
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>(o&&o.method&&o.method!=='GET')?Promise.resolve(new Response('{"error":"the server refused the write"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          # Every wait here polls for the thing to ARRIVE. The sleeps that used to open this — 400ms
          # for the modal, 2000ms for the answer — were bets that pass on a laptop and fail on a
          # loaded runner. Not hypothetical: cortex's newest gate photographed its own panel 17px
          # from home, mid-slide, on the first CI run that ever opened it.
          #
          # The 2000ms one let BOTH conditions settle before asserting, so the poll has to wait for
          # both too — for the page to have spoken AND stopped spinning. Polling only for the message
          # can catch the button mid-reset and report it stuck when it is merely on its way back.
          pre: >-
            const settled=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}return false;};const said=()=>[...document.querySelectorAll('*')].some(e=>e.children.length===0&&/refused the write/i.test(e.textContent));const spinning=()=>[...document.querySelectorAll('button')].filter(b=>b.disabled&&/…|ing\b/i.test(b.textContent));document.getElementById('newTaskBtn').click();if(!await settled(()=>document.getElementById('nt-title'))) throw new Error('the new-task modal never opened — there is nothing here to refuse');const t=document.getElementById('nt-title');t.value='a task that will never be created';t.dispatchEvent(new Event('input',{bubbles:true}));document.getElementById('nt-go').click();await settled(()=>said()&&!spinning().length);const stuck=spinning();if(stuck.length) throw new Error('THE WRITE FAILED AND THE BUTTON IS STILL SPINNING: '+stuck.map(b=>b.textContent.trim()).join(', '));if(!said()) throw new Error('THE WRITE FAILED AND THE PAGE SAID NOTHING — the user cannot tell whether their work was saved');
