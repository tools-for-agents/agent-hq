<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent HQ · tools-for-agents</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🛰️</span>
      <div>
        <h1>Agent HQ</h1>
        <span class="sub">the all-agent company · <code>tools-for-agents</code></span>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="conn" id="conn"><span class="dot"></span><span id="conn-label">connecting…</span></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="board">🗂️ Kanban</button>
    <button class="tab" data-view="agents">🤖 Agents</button>
    <button class="tab" data-view="memory">🧠 Memory</button>
    <button class="tab" data-view="graph">🕸️ Graph</button>
    <button class="tab" data-view="messages">✉️ Messages</button>
    <button class="tab" data-view="ledger">🧾 Ledger</button>
    <button class="tab" data-view="activity">📡 Activity</button>
  </nav>

  <main>
    <section id="view-board" class="view active">
      <div class="board" id="board"></div>
    </section>

    <section id="view-agents" class="view">
      <div class="grid" id="agents"></div>
    </section>

    <section id="view-memory" class="view">
      <div class="mem-toolbar">
        <input id="mem-search" placeholder="search memory…  (title / content)" />
      </div>
      <div class="mem-list" id="memory"></div>
    </section>

    <section id="view-graph" class="view">
      <div class="graph-wrap" id="graph-wrap">
        <canvas id="graph-canvas"></canvas>

        <div class="graph-hud gh-top">
          <input id="graph-search" placeholder="find a memory, agent, tag…" autocomplete="off" />
          <div class="graph-search-drop" id="graph-search-drop"></div>
        </div>

        <div class="graph-legend" id="graph-legend"></div>

        <div class="graph-controls">
          <button id="gc-recenter" title="Fit graph to view">⤢ Fit</button>
          <button id="gc-reheat" title="Re-run layout">✷ Relayout</button>
          <button id="gc-png" title="Download as PNG">⤓ PNG</button>
        </div>

        <div class="graph-filterpill" id="graph-filterpill" hidden></div>
        <div class="graph-tooltip" id="graph-tooltip" hidden></div>

        <aside class="graph-panel" id="graph-panel" hidden>
          <button class="gp-close" id="gp-close" title="Close">✕</button>
          <div class="gp-body" id="gp-body"></div>
        </aside>

        <div class="graph-empty" id="graph-empty" hidden>
          <div class="ge-mark">🕸️</div>
          <p>No shared knowledge yet.</p>
          <span>Agents build this graph as they <code>memory_write</code> — memories link to their namespaces, tags, and authors.</span>
        </div>
      </div>
    </section>

    <section id="view-messages" class="view">
      <div class="msg-list" id="messages"></div>
    </section>

    <section id="view-ledger" class="view">
      <div id="ledger"></div>
    </section>

    <section id="view-activity" class="view">
      <div class="act-filter" id="act-filter"></div>
      <ul class="feed" id="activity-full"></ul>
    </section>
  </main>

  <aside class="ticker">
    <div class="ticker-head">📡 Live feed</div>
    <ul class="feed" id="activity-mini"></ul>
  </aside>

  <script src="/graph.js"></script>
  <script src="/app.js"></script>
<div class="xtk" aria-label="tools-for-agents sibling web views">
  <span class="xtk-l">tools-for-agents</span>
  <span class="cur" style="--x:#6ea8fe">🛰️ agent-hq</span>
  <a href="http://localhost:7900/" style="--x:#4fd6be" title="open lens">🔎 lens</a>
  <a href="http://localhost:7930/" style="--x:#ff6a1a" title="open anvil">⚒ anvil</a>
  <a href="http://localhost:7800/" style="--x:#a78bfa" title="open cortex">🧠 cortex</a>
  <a href="http://localhost:7950/" style="--x:#e0a24e" title="open scout">🧭 scout</a>
  <a href="http://localhost:7980/" style="--x:#ec4899" title="open recall">◎ recall</a>
</div>
</body>
</html>
